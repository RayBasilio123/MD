<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Arc paths for text: radius 140, centered at 200,200 -->
    <path id="topArc"    d="M 60 200 A 140 140 0 0 1 340 200"/>
    <path id="bottomArc" d="M 60 200 A 140 140 0 0 0 340 200"/>
    <clipPath id="clip">
      <circle cx="200" cy="200" r="199"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <circle cx="200" cy="200" r="200" fill="#0A0A0A"/>

    <!-- Outer ring: 4 green arcs, gaps at cardinal points (~20° each) -->
    <!-- Segments: 10°→80°, 100°→170°, 190°→260°, 280°→350° -->
    <g fill="none" stroke="#19E27A" stroke-width="22" stroke-linecap="butt">
      <path d="M 372.3 230.4 A 175 175 0 0 1 230.4 372.3"/>
      <path d="M 169.6 372.3 A 175 175 0 0 1 27.7 230.4"/>
      <path d="M 27.7 169.6  A 175 175 0 0 1 169.6 27.7"/>
      <path d="M 230.4 27.7  A 175 175 0 0 1 372.3 169.6"/>
    </g>

    <!-- Tab protrusions at each gap endpoint (8 total) -->
    <g fill="#19E27A">
      <rect transform="translate(200,200) rotate(10)  translate(184,-5)" width="14" height="10"/>
      <rect transform="translate(200,200) rotate(80)  translate(184,-5)" width="14" height="10"/>
      <rect transform="translate(200,200) rotate(100) translate(184,-5)" width="14" height="10"/>
      <rect transform="translate(200,200) rotate(170) translate(184,-5)" width="14" height="10"/>
      <rect transform="translate(200,200) rotate(190) translate(184,-5)" width="14" height="10"/>
      <rect transform="translate(200,200) rotate(260) translate(184,-5)" width="14" height="10"/>
      <rect transform="translate(200,200) rotate(280) translate(184,-5)" width="14" height="10"/>
      <rect transform="translate(200,200) rotate(350) translate(184,-5)" width="14" height="10"/>
    </g>

    <!-- White separator ring between outer ring and text zone -->
    <circle cx="200" cy="200" r="153" fill="none" stroke="white" stroke-width="1.5"/>

    <!-- Inner dashed ring -->
    <circle cx="200" cy="200" r="130" fill="none" stroke="#19E27A" stroke-width="1.5" stroke-dasharray="5 6"/>

    <!-- Arc text: MINEDEBUG (top) -->
    <text font-family="Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="9" fill="white" text-anchor="middle">
      <textPath href="#topArc" startOffset="50%">MINEDEBUG</textPath>
    </text>

    <!-- Arc text: TECHNOLOGY (bottom) -->
    <text font-family="Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="7" fill="white" text-anchor="middle">
      <textPath href="#bottomArc" startOffset="50%">TECHNOLOGY</textPath>
    </text>

    <!-- Network nodes at diagonal positions (NE, SE, SW, NW), r≈85 from center -->
    <g fill="#0A0A0A" stroke="#19E27A" stroke-width="2">
      <circle cx="260" cy="140" r="8"/>
      <circle cx="260" cy="260" r="8"/>
      <circle cx="140" cy="260" r="8"/>
      <circle cx="140" cy="140" r="8"/>
    </g>

    <!-- Lines from network nodes to gear edge -->
    <g stroke="#19E27A" stroke-width="1.5">
      <line x1="254" y1="146" x2="227" y2="173"/>
      <line x1="254" y1="254" x2="227" y2="227"/>
      <line x1="146" y1="254" x2="173" y2="227"/>
      <line x1="146" y1="146" x2="173" y2="173"/>
    </g>

    <!-- CENTRAL GEAR -->
    <g transform="translate(200 200)">
      <!-- 8 gear teeth at 45° intervals -->
      <g fill="white">
        <rect x="-5" y="-50" width="10" height="14" rx="2"/>
        <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(45)"/>
        <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(90)"/>
        <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(135)"/>
        <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(180)"/>
        <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(225)"/>
        <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(270)"/>
        <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(315)"/>
      </g>
      <!-- Gear body ring (white) -->
      <circle r="37" fill="white"/>
      <!-- Gear dark center -->
      <circle r="29" fill="#0A0A0A"/>

      <!-- BUG: head -->
      <ellipse cx="0" cy="-9" rx="7.5" ry="6" fill="white"/>
      <!-- BUG: antennae -->
      <line x1="-4" y1="-15" x2="-9" y2="-23" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="-9.5" cy="-23.5" r="1.8" fill="white"/>
      <line x1="4" y1="-15" x2="9" y2="-23" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="9.5" cy="-23.5" r="1.8" fill="white"/>
      <!-- BUG: body (two segments) -->
      <ellipse cx="0" cy="3" rx="7" ry="5" fill="white"/>
      <ellipse cx="0" cy="12" rx="7.5" ry="8" fill="white"/>
      <!-- BUG: body center line -->
      <line x1="0" y1="-3" x2="0" y2="19" stroke="#0A0A0A" stroke-width="1.5"/>
      <!-- BUG: 3 pairs of legs -->
      <g stroke="white" stroke-width="1.6" stroke-linecap="round">
        <line x1="-7"  y1="0"  x2="-17" y2="-4"/>
        <line x1="-7"  y1="5"  x2="-18" y2="5"/>
        <line x1="-7"  y1="11" x2="-17" y2="15"/>
        <line x1="7"   y1="0"  x2="17"  y2="-4"/>
        <line x1="7"   y1="5"  x2="18"  y2="5"/>
        <line x1="7"   y1="11" x2="17"  y2="15"/>
      </g>
    </g>
  </g>
</svg>
