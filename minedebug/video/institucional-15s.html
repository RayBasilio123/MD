// ─── Scene wrapper with smooth fade-in / fade-out ────────────────────────────
function Scene({ start, end, fadeIn = 0.9, fadeOut = 0.9, children }) {
  const t = useTime();
  if (t < start - 0.1 || t > end + 0.1) return null;
  const loc  = t - start;
  const dur  = end - start;
  const inP  = clamp(loc / fadeIn, 0, 1);
  const outP = clamp((loc - (dur - fadeOut)) / fadeOut, 0, 1);
  const op   = Easing.easeInOutSine(inP) * (1 - Easing.easeInOutSine(outP));
  return (
    <SpriteContext.Provider value={{ localTime: Math.max(0, loc), progress: clamp(loc / dur, 0, 1), duration: dur, visible: true }}>
      <div style={{ position: 'absolute', inset: 0, opacity: op, overflow: 'hidden' }}>
        {children}
      </div>
    </SpriteContext.Provider>
  );
}

// ─── Slide-up reveal (uses SpriteContext.localTime) ──────────────────────────
function Reveal({ children, delay = 0, dur = 0.9, y = 24, style }) {
  const { localTime } = useSprite();
  const t = clamp((localTime - delay) / dur, 0, 1);
  const e = Easing.easeOutCubic(t);
  return (
    <div style={{ opacity: e, transform: `translateY(${(1 - e) * y}px)`, ...style }}>
      {children}
    </div>
  );
}

// ─── Animated counter (pt-BR formatted) ─────────────────────────────────────
function Counter({ target, suffix = '', prefix = '', decimals = 0 }) {
  const { progress } = useSprite();
  const v = (target * Easing.easeOutCubic(progress));
  const s = v.toLocaleString('pt-BR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  return <>{prefix}{s}{suffix}</>;
}

// ─── Eyebrow label ───────────────────────────────────────────────────────────
function Eyebrow({ label, color = GN, delay = 0 }) {

    <Reveal delay={delay} dur={0.7}>
      <div style={{ fontFamily: MONO, fontSize: 13, letterSpacing: '.2em', fontWeight: 600, color, display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
        <span style={{ width: 32, height: 1, background: color, display: 'inline-block', flexShrink: 0 }} />

    </Reveal>
  );
}

// ─── Full-bleed photo background ─────────────────────────────────────────────
function PhotoBg({ src, opacity = 0.4, blend = false }) {

    <div style={{
      position: 'absolute', inset: 0,
      backgroundImage: `url(${src})`,
      backgroundSize: 'cover', backgroundPosition: 'center',

    }} />
  );
}

// ─── Dark overlay ────────────────────────────────────────────────────────────
function Overlay({ from = 'rgba(0,0,0,.5)', to = 'rgba(0,0,0,.88)', angle = '180deg' }) {
  return <div style={{ position: 'absolute', inset: 0, background: `linear-gradient(${angle}, ${from}, ${to})` }} />;
}

// ─── Horizontal divider ──────────────────────────────────────────────────────
function Divider({ color = GN, width = 48, delay = 0 }) {
  const { localTime } = useSprite();
  const t = clamp((localTime - delay) / 0.8, 0, 1);
  const e = Easing.easeOutCubic(t);
  return <div style={{ width: e * width, height: 1, background: color, marginBottom: 20, marginTop: 4 }} />;
}

// ─── Big stat card ───────────────────────────────────────────────────────────
function StatCard({ value, suffix, label, delay, color = GN, size = 96 }) {

    <Sprite start={0} end={Infinity}>

  );
}

// ─── Bullet item ─────────────────────────────────────────────────────────────

function ProgressBar() {
  const t = useTime();
  const p = clamp(t / 75, 0, 1);
  return (
    <>
      <div style={{ position: 'absolute', left: 0, bottom: 0, height: 3, width: '100%', background: 'rgba(255,255,255,.08)', zIndex: 10 }} />
      <div style={{ position: 'absolute', left: 0, bottom: 0, height: 3, width: `${p * 100}%`, background: GN, zIndex: 11, transition: 'none' }} />
      <div style={{ position: 'absolute', top: 20, right: 28, fontFamily: MONO, fontSize: 10, letterSpacing: '.14em', color: 'rgba(255,255,255,.4)', zIndex: 10 }}>
        {String(Math.floor(t * 10) / 10).padStart(4, '0')}s / 75.0s

      <div style={{ position: 'absolute', top: 20, left: 28, fontFamily: MONO, fontSize: 10, letterSpacing: '.14em', color: 'rgba(255,255,255,.4)', zIndex: 10, display: 'flex', alignItems: 'center', gap: 8 }}>

  );
