<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:0;background:#0A0A0A;font-family:var(--font-sans);color:#fff}
.wrap{padding:32px;display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center}
.left .display{font-family:var(--font-mono);font-size:64px;line-height:.95;font-weight:700;letter-spacing:-.02em;text-transform:uppercase}
.left .display .accent{color:#19E27A}
.right{font-family:var(--font-mono);font-size:11px;color:#8A929E;letter-spacing:.06em;text-transform:uppercase}
.right .row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #232830}
.right .row span:last-child{color:#fff}
</style></head><body>
<div class="wrap">
  <div class="left"><div class="display">MINE<span class="accent">DEBUG</span></div></div>
  <div class="right">
    <div class="row"><span>Family</span><span>JetBrains Mono</span></div>
    <div class="row"><span>Weight</span><span>700 Bold</span></div>
    <div class="row"><span>Case</span><span>Uppercase</span></div>
    <div class="row"><span>Tracking</span><span>-0.02em</span></div>
    <div class="row"><span>Use</span><span>Display / Hero</span></div>
  </div>
</div>
</body></html>
