<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.btn{font-family:var(--font-sans);font-weight:600;font-size:14px;border-radius:4px;padding:10px 18px;border:1px solid transparent;cursor:pointer;transition:all 120ms;display:inline-flex;align-items:center;gap:8px}
.primary{background:#19E27A;color:#0A0A0A}
.primary:hover{background:#34F092}
.secondary{background:transparent;color:#111418;border-color:#DDE1E6}
.secondary:hover{border-color:#B9BFC8;background:#F7F8FA}
.ghost{background:transparent;color:#111418;border-color:transparent}
.ghost:hover{background:#EFF1F4}
.danger{background:transparent;color:#F25C54;border-color:#F25C54}
.danger:hover{background:#F25C54;color:#fff}
.disabled{opacity:.4;cursor:not-allowed}
.focus{box-shadow:0 0 0 4px rgba(25,226,122,.35)}
.label{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:10px;font-weight:600}
</style></head><body>
<div class="label">Buttons</div>
<div class="row">
  <button class="btn primary">Iniciar diagnóstico</button>
  <button class="btn primary focus">Focused</button>
  <button class="btn secondary">Exportar</button>
  <button class="btn ghost">Cancelar</button>
  <button class="btn danger">Parada de emergência</button>
  <button class="btn primary disabled">Disabled</button>
</div>
</body></html>
