<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#0A0A0A;font-family:var(--font-mono);color:#fff}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.box{background:#181C22;border:1px solid #232830;border-radius:8px;padding:16px}
.label{font-size:10px;color:#8A929E;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.val{font-size:32px;font-weight:600;letter-spacing:.02em;font-variant-numeric:tabular-nums}
.unit{color:#8A929E;font-weight:400;font-size:18px}
.delta{font-size:11px;margin-top:4px}
.up{color:#19E27A}.down{color:#F25C54}
</style></head><body>
<div class="grid">
  <div class="box"><div class="label">Consumo 24h</div><div class="val">47.2<span class="unit"> L/h</span></div><div class="delta down">-12.4% vs baseline</div></div>
  <div class="box"><div class="label">Frota ativa</div><div class="val">128<span class="unit">/142</span></div><div class="delta up">+3 desde ontem</div></div>
  <div class="box"><div class="label">CO₂ evitado</div><div class="val">1 284<span class="unit"> kg</span></div><div class="delta up">+8.1%</div></div>
</div>
</body></html>
