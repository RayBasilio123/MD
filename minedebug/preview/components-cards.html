<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#F7F8FA;font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:#fff;border:1px solid #DDE1E6;border-radius:8px;padding:18px;display:flex;flex-direction:column;gap:10px}
.eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#5A626E;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#111418}
.metric{font-family:var(--font-mono);font-size:32px;font-weight:600;letter-spacing:.02em;color:#111418;font-variant-numeric:tabular-nums}
.unit{color:#8A929E;font-size:18px;font-weight:400}
.delta{font-family:var(--font-mono);font-size:11px;color:#10B962;font-weight:600}
.dot{display:inline-block;width:6px;height:6px;border-radius:999px;background:#19E27A;margin-right:4px}
</style></head><body>
<div class="grid">
  <div class="card">
    <div class="eyebrow"><span><span class="dot"></span>CAM-407 · ONLINE</span><span>4s</span></div>
    <div class="title">Consumo médio</div>
    <div class="metric">38.4<span class="unit"> L/h</span></div>
    <div class="delta">↓ 14.2% vs baseline</div>
  </div>
  <div class="card">
    <div class="eyebrow"><span style="color:#10B962">Mês corrente</span><span>Mai/26</span></div>
    <div class="title">CO₂ evitado</div>
    <div class="metric">8 412<span class="unit"> kg</span></div>
    <div class="delta">↑ 8.1% vs Abr</div>
  </div>
</div>
</body></html>
