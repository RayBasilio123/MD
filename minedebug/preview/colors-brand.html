<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.sw{flex:1;height:120px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff;font-family:var(--font-mono);font-size:11px;letter-spacing:.04em}
.sw .n{font-weight:600;font-size:12px}
.sw .h{opacity:.85}
.dark{color:#fff}.light{color:#0A0A0A}
.label{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:8px;font-weight:600}
</style></head><body>
<div class="label">Brand · Green</div>
<div class="row">
  <div class="sw light" style="background:#E2FBEE"><div class="n">green-100</div><div class="h">#E2FBEE</div></div>
  <div class="sw light" style="background:#7CF5B5"><div class="n">green-300</div><div class="h">#7CF5B5</div></div>
  <div class="sw dark" style="background:#34F092"><div class="n">green-400</div><div class="h">#34F092</div></div>
  <div class="sw dark" style="background:#19E27A"><div class="n">green-500 ★</div><div class="h">#19E27A</div></div>
  <div class="sw dark" style="background:#10B962"><div class="n">green-600</div><div class="h">#10B962</div></div>
</div>
</body></html>
