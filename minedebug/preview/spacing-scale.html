<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;align-items:end}
.col{display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{background:#19E27A;width:100%}
.tag{font-family:var(--font-mono);font-size:10px;color:#5A626E;letter-spacing:.04em}
.px{font-family:var(--font-mono);font-size:10px;color:#8A929E}
.label{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:12px;font-weight:600}
</style></head><body>
<div class="label">Spacing scale · 4px grid</div>
<div class="grid">
  <div class="col"><div class="bar" style="height:4px"></div><div class="tag">s-1</div><div class="px">4</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="tag">s-2</div><div class="px">8</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="tag">s-3</div><div class="px">12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="tag">s-4</div><div class="px">16</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="tag">s-5</div><div class="px">24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="tag">s-6</div><div class="px">32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="tag">s-7</div><div class="px">48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="tag">s-8</div><div class="px">64</div></div>
</div>
</body></html>
