<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-family:var(--font-mono);font-size:10px;letter-spacing:.04em}
.sw .n{font-weight:600;font-size:11px}
.dark{color:#fff}.light{color:#0A0A0A}
.label{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:8px;font-weight:600}
</style></head><body>
<div class="label">Neutrals · Slate scale</div>
<div class="row">
  <div class="sw light" style="background:#F7F8FA"><div class="n">050</div><div>F7F8FA</div></div>
  <div class="sw light" style="background:#EFF1F4"><div class="n">100</div><div>EFF1F4</div></div>
  <div class="sw light" style="background:#DDE1E6"><div class="n">200</div><div>DDE1E6</div></div>
  <div class="sw light" style="background:#B9BFC8"><div class="n">300</div><div>B9BFC8</div></div>
  <div class="sw dark" style="background:#8A929E"><div class="n">400</div><div>8A929E</div></div>
  <div class="sw dark" style="background:#5A626E"><div class="n">500</div><div>5A626E</div></div>
  <div class="sw dark" style="background:#353B45"><div class="n">600</div><div>353B45</div></div>
  <div class="sw dark" style="background:#232830"><div class="n">700</div><div>232830</div></div>
  <div class="sw dark" style="background:#181C22"><div class="n">800</div><div>181C22</div></div>
  <div class="sw dark" style="background:#0A0A0A"><div class="n">black</div><div>0A0A0A</div></div>
</div>
</body></html>
