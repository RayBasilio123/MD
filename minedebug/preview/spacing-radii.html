<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.grid{display:flex;gap:14px;align-items:flex-end}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{width:80px;height:80px;background:#19E27A;border:1px solid #10B962}
.tag{font-family:var(--font-mono);font-size:11px;color:#5A626E}
.label{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:14px;font-weight:600}
</style></head><body>
<div class="label">Radii · industrial / hardware</div>
<div class="grid">
  <div class="cell"><div class="box" style="border-radius:0"></div><div class="tag">r-0 · 0</div></div>
  <div class="cell"><div class="box" style="border-radius:2px"></div><div class="tag">r-1 · 2</div></div>
  <div class="cell"><div class="box" style="border-radius:4px"></div><div class="tag">r-2 · 4</div></div>
  <div class="cell"><div class="box" style="border-radius:8px"></div><div class="tag">r-3 · 8</div></div>
  <div class="cell"><div class="box" style="border-radius:12px"></div><div class="tag">r-4 · 12</div></div>
  <div class="cell"><div class="box" style="border-radius:999px;width:120px;height:40px"></div><div class="tag">pill</div></div>
</div>
</body></html>
