<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>MineDebug · Operações</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" href="../../assets/logo.svg">
<script>
  // Auth gate — redirect to login if no session
  (function(){
    try {
      var auth = sessionStorage.getItem('md-auth');
      if (!auth) { window.location.replace('../../site/login.html'); }
    } catch(e) { window.location.replace('../../site/login.html'); }
  })();
</script>
<style>
  html, body { background: var(--md-ink-900); color: var(--fg-1); margin: 0; height: 100%; }
  body { display: flex; flex-direction: column; }
  body { color-scheme: dark; }
  :root { --bg: var(--md-ink-900); --bg-elev: var(--md-ink-800); --surface: var(--md-ink-800); --surface-2: var(--md-ink-700); --border: var(--md-ink-600); --hairline: #20252C; --fg-1: #fff; --fg-2: var(--md-ink-200); --fg-3: var(--md-ink-300); --fg-4: var(--md-ink-400); }

  /* === Topbar === */
  .topbar { display: flex; align-items: center; gap: 24px; padding: 0 20px; height: 56px; background: rgba(10,10,10,.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--hairline); flex: none; }
  .topbar-brand { display: flex; align-items: center; gap: 10px; }
  .topbar-logo { width: 28px; height: 28px; }
  .topbar-wordmark { font-family: var(--font-mono); font-weight: 700; font-size: 14px; letter-spacing: .04em; color: #fff; }
  .topbar-wordmark span { color: var(--md-green-500); }
  .topbar-nav { display: flex; gap: 4px; flex: 1; margin-left: 16px; }
  .topbar-nav a { font-size: 13px; padding: 8px 12px; border-radius: 4px; color: var(--md-ink-300); text-decoration: none; font-weight: 500; }
  .topbar-nav a:hover { background: rgba(255,255,255,.05); color: #fff; }
  .topbar-nav a.active { color: var(--md-green-500); background: rgba(25,226,122,.08); }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .topbar-status { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: rgba(25,226,122,.08); border: 1px solid rgba(25,226,122,.3); border-radius: 999px; font-size: 11px; color: var(--md-green-400); letter-spacing: .06em; }
  .topbar-avatar { width: 32px; height: 32px; border-radius: 999px; background: var(--md-green-500); color: var(--md-black); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-weight: 700; font-size: 12px; }

  /* === Layout === */
  .shell { display: flex; flex: 1; min-height: 0; }
  .sidebar { width: 240px; background: var(--md-ink-900); border-right: 1px solid var(--hairline); padding: 20px 12px; display: flex; flex-direction: column; gap: 24px; flex: none; }
  .sidebar-section { display: flex; flex-direction: column; gap: 2px; }
  .sidebar-heading { padding: 0 10px 6px; color: var(--md-ink-400) !important; }
  .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 4px; text-decoration: none; color: var(--md-ink-200); font-size: 13px; font-weight: 500; }
  .sidebar-item:hover { background: rgba(255,255,255,.04); color: #fff; }
  .sidebar-item.active { background: rgba(25,226,122,.10); color: #fff; box-shadow: inset 2px 0 0 var(--md-green-500); }
  .sidebar-item i { width: 16px; height: 16px; flex: none; opacity: .9; }
  .sidebar-label { flex: 1; }
  .sidebar-count { font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; border-radius: 999px; background: rgba(255,255,255,.06); color: var(--md-ink-300); font-weight: 600; }
  .sidebar-count.warn { background: rgba(245,183,58,.16); color: var(--md-warning); }
  .sidebar-foot { margin-top: auto; padding: 12px 10px; border-top: 1px solid var(--hairline); display: flex; flex-direction: column; gap: 4px; }
  .sidebar-site { font-size: 10px; letter-spacing: .08em; color: var(--md-green-500); font-weight: 600; }

  /* === Main === */
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: auto; }
  .page-head { padding: 24px 32px 16px; display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 1px solid var(--hairline); }
  .page-head h1 { font-size: 28px; font-weight: 700; letter-spacing: -.02em; margin: 0; }
  .page-head .sub { font-family: var(--font-mono); font-size: 11px; color: var(--md-ink-300); letter-spacing: .06em; text-transform: uppercase; margin-top: 4px; }
  .page-head .actions { display: flex; gap: 8px; }
  .btn { font-family: var(--font-sans); font-weight: 600; font-size: 13px; border-radius: 4px; padding: 8px 14px; border: 1px solid transparent; cursor: pointer; transition: all 120ms; display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: var(--md-green-500); color: var(--md-black); }
  .btn-primary:hover { background: var(--md-green-400); }
  .btn-ghost { background: transparent; color: #fff; border-color: var(--md-ink-600); }
  .btn-ghost:hover { border-color: var(--md-ink-500); background: rgba(255,255,255,.04); }
  .btn i { width: 14px; height: 14px; }

  /* === Metrics row === */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px 32px 0; }
  .metric-card { background: var(--surface); border: 1px solid var(--md-ink-700); border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 6px; }
  .metric-head { display: flex; justify-content: space-between; align-items: center; }
  .metric-label { font-size: 13px; color: var(--md-ink-300); font-weight: 500; }
  .metric-value { font-family: var(--font-mono); font-size: 30px; font-weight: 600; color: #fff; letter-spacing: .01em; }
  .metric-unit { color: var(--md-ink-400); font-size: 16px; font-weight: 400; }
  .metric-delta { font-size: 11px; font-weight: 600; }

  /* === Content grid === */
  .content { display: grid; grid-template-columns: 1fr 320px; gap: 16px; padding: 16px 32px 32px; flex: 1; }
  .panel { background: var(--surface); border: 1px solid var(--md-ink-700); border-radius: 8px; overflow: hidden; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--hairline); }
  .panel-head h3 { font-size: 14px; font-weight: 600; margin: 0; }
  .panel-head .filter { display: flex; gap: 4px; }
  .filter-btn { font-family: var(--font-mono); font-size: 10px; padding: 4px 8px; border-radius: 4px; background: transparent; border: 1px solid var(--md-ink-600); color: var(--md-ink-300); cursor: pointer; letter-spacing: .06em; }
  .filter-btn.active { background: var(--md-green-500); color: var(--md-black); border-color: var(--md-green-500); }

  /* === Fleet table === */
  .fleet-table { font-size: 13px; }
  .fleet-thead, .fleet-row { display: flex; align-items: center; gap: 12px; padding: 0 16px; height: 38px; }
  .fleet-thead { color: var(--md-ink-400) !important; height: 32px; border-bottom: 1px solid var(--hairline); }
  .fleet-row { border-bottom: 1px solid var(--hairline); cursor: pointer; transition: background 120ms; }
  .fleet-row:hover { background: rgba(255,255,255,.03); }
  .fleet-row.selected { background: rgba(25,226,122,.06); box-shadow: inset 2px 0 0 var(--md-green-500); }
  .fleet-row:last-child { border-bottom: none; }
  .fleet-id { color: #fff; font-weight: 600; font-size: 12px; }
  .fleet-model { color: var(--md-ink-200); font-size: 12px; }
  .fleet-baseline { color: var(--md-ink-400); }
  .fleet-last { color: var(--md-ink-400); font-size: 11px; }

  /* === Dots & chips === */
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 999px; }
  .dot-ok { background: var(--md-green-500); box-shadow: 0 0 0 3px rgba(25,226,122,.2); }
  .dot-warn { background: var(--md-warning); }
  .dot-err { background: var(--md-danger); box-shadow: 0 0 0 3px rgba(242,92,84,.2); animation: pulse 2s infinite; }
  .dot-off { background: var(--md-ink-500); }
  @keyframes pulse { 50% { box-shadow: 0 0 0 6px rgba(242,92,84,.05); } }
  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; letter-spacing: .06em; }
  .chip-ok { background: rgba(25,226,122,.1); color: var(--md-green-400); }
  .chip-warn { background: rgba(245,183,58,.14); color: var(--md-warning); }
  .chip-err { background: rgba(242,92,84,.12); color: var(--md-danger); }
  .chip-off { background: rgba(255,255,255,.04); color: var(--md-ink-400); }
  .chip .dot { width: 5px; height: 5px; box-shadow: none !important; animation: none !important; }

  /* === Alerts === */
  .alert-list { display: flex; flex-direction: column; }
  .alert-item { display: flex; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--hairline); }
  .alert-item:last-child { border-bottom: none; }
  .alert-icon { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex: none; }
  .alert-icon i { width: 14px; height: 14px; }
  .alert-err .alert-icon { background: rgba(242,92,84,.12); color: var(--md-danger); }
  .alert-warn .alert-icon { background: rgba(245,183,58,.14); color: var(--md-warning); }
  .alert-ok .alert-icon { background: rgba(25,226,122,.1); color: var(--md-green-500); }
  .alert-info .alert-icon { background: rgba(77,163,255,.12); color: var(--md-info); }
  .alert-body { flex: 1; min-width: 0; }
  .alert-title { font-size: 13px; font-weight: 600; color: #fff; }
  .alert-detail { font-size: 11px; color: var(--md-ink-300); margin-top: 2px; }
  .alert-time { font-size: 10px; color: var(--md-ink-400); flex: none; }
</style>
</head>
<body data-screen-label="01 Operações Dashboard">

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<script type="text/babel" src="Topbar.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="MetricCard.jsx"></script>
<script type="text/babel" src="FleetTable.jsx"></script>
<script type="text/babel" src="AlertList.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

function App() {
  useEffect(() => {
    if (window.lucide) lucide.createIcons();
  });

  const consumoSpark = [52, 50, 49, 51, 48, 47, 46, 45, 44, 43, 42, 41, 40, 39, 38];
  const co2Spark = [40, 60, 55, 80, 90, 85, 110, 130, 125, 150, 170, 165, 180, 200, 215];
  const fleetSpark = [120, 122, 125, 124, 126, 128, 127, 128, 130, 128];
  const alertSpark = [2, 3, 1, 4, 2, 5, 3, 4, 3, 3];

  return (
    <>
      <Topbar />
      <div className="shell">
        <Sidebar active="fleet" />
        <main className="main">
          <div className="page-head">
            <div>
              <div className="sub">Operações · ao vivo</div>
              <h1>Frota · Carajás Setor 4</h1>
            </div>
            <div className="actions">
              <button className="btn btn-ghost"><i data-lucide="download"/>Exportar</button>
              <button className="btn btn-primary"><i data-lucide="play"/>Iniciar diagnóstico</button>
            </div>
          </div>

          <div className="metrics">
            <MetricCard eyebrow="CONSUMO MÉDIO 24H" label="Frota total" value="42.6" unit="L/h" delta="12.4% vs baseline" deltaDir="down" isGood={true} spark={consumoSpark} sparkColor="#19E27A"/>
            <MetricCard eyebrow="CO₂ EVITADO 24H" label="Mês corrente" value="1 284" unit="kg" delta="8.1%" deltaDir="up" isGood={true} spark={co2Spark} sparkColor="#19E27A"/>
            <MetricCard eyebrow="FROTA ATIVA" label="Equipamentos online" value="128" unit="/142" delta="3 desde ontem" deltaDir="up" isGood={true} spark={fleetSpark} sparkColor="#4DA3FF"/>
            <MetricCard eyebrow="ALERTAS ABERTOS" label="Últimas 4h" value="3" unit="" delta="2 críticos" deltaDir="up" isGood={false} spark={alertSpark} sparkColor="#F25C54"/>
          </div>

          <div className="content">
            <div className="panel">
              <div className="panel-head">
                <h3>Equipamentos</h3>
                <div className="filter">
                  <button className="filter-btn active">TODOS</button>
                  <button className="filter-btn">ONLINE</button>
                  <button className="filter-btn">ALERTA</button>
                </div>
              </div>
              <FleetTable />
            </div>
            <div className="panel">
              <div className="panel-head">
                <h3>Alertas recentes</h3>
                <span className="t-mono" style={{fontSize: 10, color: "var(--md-ink-400)"}}>5 ITENS</span>
              </div>
              <AlertList />
            </div>
          </div>
        </main>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
