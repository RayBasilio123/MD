<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.card{border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;align-items:center;gap:12px}
.dot{width:36px;height:36px;border-radius:8px;flex:none}
.meta .n{font-weight:700;font-size:13px;color:var(--fg-1)}
.meta .h{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:.04em}
.label{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:10px;font-weight:600}
</style></head><body>
<div class="label">Semantic · Status</div>
<div class="grid">
  <div class="card"><div class="dot" style="background:#19E27A"></div><div class="meta"><div class="n">Success / OK</div><div class="h">#19E27A</div></div></div>
  <div class="card"><div class="dot" style="background:#F5B73A"></div><div class="meta"><div class="n">Warning</div><div class="h">#F5B73A</div></div></div>
  <div class="card"><div class="dot" style="background:#F25C54"></div><div class="meta"><div class="n">Danger</div><div class="h">#F25C54</div></div></div>
  <div class="card"><div class="dot" style="background:#4DA3FF"></div><div class="meta"><div class="n">Info</div><div class="h">#4DA3FF</div></div></div>
  <div class="card"><div class="dot" style="background:#E5F03A"></div><div class="meta"><div class="n">Hi-Vis</div><div class="h">#E5F03A</div></div></div>
  <div class="card"><div class="dot" style="background:#B25A2E"></div><div class="meta"><div class="n">Rust accent</div><div class="h">#B25A2E</div></div></div>
  <div class="card"><div class="dot" style="background:#0A0A0A;border:1px solid var(--border)"></div><div class="meta"><div class="n">Black</div><div class="h">#0A0A0A</div></div></div>
  <div class="card"><div class="dot" style="background:#FFFFFF;border:1px solid var(--border)"></div><div class="meta"><div class="n">White</div><div class="h">#FFFFFF</div></div></div>
</div>
</body></html>
