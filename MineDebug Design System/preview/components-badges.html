<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:999px}
.dot{width:6px;height:6px;border-radius:999px}
.ok{background:rgba(25,226,122,.12);color:#10B962}.ok .dot{background:#19E27A;box-shadow:0 0 0 3px rgba(25,226,122,.25)}
.warn{background:rgba(245,183,58,.14);color:#A77918}.warn .dot{background:#F5B73A}
.err{background:rgba(242,92,84,.12);color:#C03A33}.err .dot{background:#F25C54}
.info{background:rgba(77,163,255,.12);color:#1E68C2}.info .dot{background:#4DA3FF}
.off{background:#EFF1F4;color:#5A626E}.off .dot{background:#8A929E}
.label{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:10px;font-weight:600}
</style></head><body>
<div class="label">Status badges</div>
<div class="row">
  <span class="badge ok"><span class="dot"></span>Online</span>
  <span class="badge warn"><span class="dot"></span>Atenção</span>
  <span class="badge err"><span class="dot"></span>Falha</span>
  <span class="badge info"><span class="dot"></span>Telemetria</span>
  <span class="badge off"><span class="dot"></span>Offline</span>
  <span class="badge ok">CAM-407</span>
  <span class="badge err">PARADO</span>
</div>
</body></html>
