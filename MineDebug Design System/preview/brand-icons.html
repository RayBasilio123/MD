<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:14px}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px;border:1px solid #EFF1F4;border-radius:8px}
.cell i{color:#0A0A0A;width:22px;height:22px}
.tag{font-family:var(--font-mono);font-size:10px;color:#5A626E}
.label{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:10px;font-weight:600}
</style></head><body>
<div class="label">Iconography · Lucide @ 2px stroke (CDN)</div>
<div class="grid">
  <div class="cell"><i data-lucide="truck"></i><span class="tag">truck</span></div>
  <div class="cell"><i data-lucide="gauge"></i><span class="tag">gauge</span></div>
  <div class="cell"><i data-lucide="fuel"></i><span class="tag">fuel</span></div>
  <div class="cell"><i data-lucide="activity"></i><span class="tag">activity</span></div>
  <div class="cell"><i data-lucide="cpu"></i><span class="tag">cpu</span></div>
  <div class="cell"><i data-lucide="radio"></i><span class="tag">radio</span></div>
  <div class="cell"><i data-lucide="alert-triangle"></i><span class="tag">alert</span></div>
  <div class="cell"><i data-lucide="wrench"></i><span class="tag">wrench</span></div>
  <div class="cell"><i data-lucide="map-pin"></i><span class="tag">map-pin</span></div>
  <div class="cell"><i data-lucide="factory"></i><span class="tag">factory</span></div>
  <div class="cell"><i data-lucide="battery-charging"></i><span class="tag">battery</span></div>
  <div class="cell"><i data-lucide="leaf"></i><span class="tag">leaf</span></div>
  <div class="cell"><i data-lucide="zap"></i><span class="tag">zap</span></div>
  <div class="cell"><i data-lucide="signal"></i><span class="tag">signal</span></div>
  <div class="cell"><i data-lucide="shield-check"></i><span class="tag">shield</span></div>
  <div class="cell"><i data-lucide="settings"></i><span class="tag">settings</span></div>
</div>
<script>lucide.createIcons();</script>
</body></html>
